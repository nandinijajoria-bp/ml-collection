<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .fw400 {
          font-weight: 400;
        }
        .width-100 {
          width: 100%;
        }
        .fw600 {
          font-weight: 600;
        }
        .width-33 {
          width: 33%;
        }
        .width-66 {
          width: 66%;
        }
        .word-wrap {
          overflow-wrap: anywhere;
        }
        .text-left {
          text-align: left;
        }
        .text-center {
          text-align: center;
        }
        .underline {
          text-decoration: underline;
        }
        .m-auto {
          margin: auto;
        }
        .mb10 {
          margin-bottom: 10px;
        }
        .mb20 {
          margin-bottom: 20px;
        }
        .mb30 {
          margin-bottom: 20px;
        }
        .mb40 {
          margin-bottom: 40px;
        }
        .mb50 {
          margin-bottom: 50px;
        }
        .width-auto {
          width: -moz-fit-content;
          width: fit-content;
        }
        .bold {
          font-weight: bold;
        }
    </style>
    <div style="padding: 20px 30px; margin-top: 50px">
    <table
            id="repayment"
            border="1"
            cellspacing="0"
            class="m-auto mb20"
            style="page-break-inside: avoid !important"
    >
        <tbody>
        <tr class="width-100">
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">
                    Borrower Name
                </p>
            </td>
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">
                    {{borrower_name}}
                </p>
            </td>
        </tr>
        <tr class="width-100">
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">Date</p>
            </td>
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">{{date}}</p>
            </td>
        </tr>
        <tr class="width-100">
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">
                    Mobile No. for OTP
                </p>
            </td>
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">
                    {{mobile_number_for_otp}}
                </p>
            </td>
        </tr>
        <tr class="width-100">
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">Platform</p>
            </td>
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">
                    {{platform}}
                </p>
            </td>
        </tr>
        <tr class="width-100">
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">IP Address</p>
            </td>
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">
                    {{ip_address}}
                </p>
            </td>
        </tr>
        <tr class="width-100">
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">Time Stamp</p>
            </td>
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">
                    {{time_stamp}}
                </p>
            </td>
        </tr>
        <tr class="width-100">
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">Loan ID</p>
            </td>
            <td style="padding: 0px 5px" class="width-auto">
                <p style="margin: 6px 16px" class="fw400 text-left">
                    {{loan_id}}
                </p>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</html>
</head>
<body>

</body>
</html>
